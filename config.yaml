# Notion 配置
notion:
  enabled: true                    # ✅ 改为 true 启用
  token: ""                        # 留空，从环境变量 NOTION_TOKEN 读取
  database_id: ""                  # 留空，从环境变量 NOTION_DATABASE_ID 读取

# 黄金坑预警配置
alert:
  enabled: true
  threshold_excess: 0
  cooldown_hours: 24
  push_title: "🔔 黄金坑触发预警"

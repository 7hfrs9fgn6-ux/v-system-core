name: 03-Full-Closure (每日自动推送 - 双阶段)

on:
  workflow_dispatch:                # 手动触发
    inputs:
      phase:
        description: '选择阶段'
        required: true
        default: 'pre'
        type: choice
        options:
          - pre
          - intraday
          - post
  schedule:
    - cron: '30 01 * * 1-5'        # 北京时间 09:30（盘前）
    - cron: '00 06 * * 1-5'        # 北京时间 14:00（盘中）

# 并发锁：防止同时运行冲突
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  PYTHON_VERSION: '3.11'
  PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
  TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

jobs:
  daily-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ① 检出代码
        uses: actions/checkout@v4

      - name: ② 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: ③ 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: ④ 时区校验
        run: |
          if [ "$(date +%Z)" != "CST" ]; then exit 1; fi
          echo "✅ 时区正确 (CST)"

      - name: ⑤ 判断触发阶段
        id: get_phase
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            HOUR=$(date +%H)
            if [ $HOUR -eq 9 ]; then PHASE="pre"
            elif [ $HOUR -eq 14 ]; then PHASE="intraday"
            else PHASE="post"
            fi
          else
            PHASE="${{ github.event.inputs.phase }}"
          fi
          echo "phase=$PHASE" >> $GITHUB_OUTPUT
          echo "当前阶段: $PHASE"

      - name: ⑥ 执行完整闭环
        run: |
          python scripts/run_with_push.py --phase ${{ steps.get_phase.outputs.phase }}

      - name: ⑦ 输出摘要
        run: |
          echo "### 📲 V系统推送摘要" >> $GITHUB_STEP_SUMMARY
          echo "时间: $(date '+%Y-%m-%d %H:%M:%S') (北京时间)" >> $GITHUB_STEP_SUMMARY
          echo "阶段: ${{ steps.get_phase.outputs.phase }}" >> $GITHUB_STEP_SUMMARY
          echo "状态: ✅ 推送完成" >> $GITHUB_STEP_SUMMARY

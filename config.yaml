# V系统策略配置
trust:
  fresh_threshold: 0.70
  stale_threshold: 0.50
  expired_threshold: 0.30
  default_trust: 0.76
  penalty_rate: 0.90

health:
  base_score: 85
  warning_penalty: 10

# 五阶段配置
phases:
  pre:
    name: "盘前预测"
    data_days_back: 1
    trust_adjustment: 0.95
    emoji: "🌅"
  intraday_a:
    name: "盘中A"
    data_days_back: 0
    trust_adjustment: 1.0
    emoji: "📈"
  intraday_b:
    name: "盘中B"
    data_days_back: 0
    trust_adjustment: 1.0
    emoji: "📊"
  post:
    name: "盘后复盘"
    data_days_back: 0
    trust_adjustment: 1.0
    emoji: "📋"
  night:
    name: "夜间预测"
    data_days_back: 0
    trust_adjustment: 0.90
    emoji: "🌙"

# 持仓映射
holdings:
  009777:
    name: "中欧阿尔法混合C"
    sectors: ["电子", "计算机", "通信"]
  006229:
    name: "中欧医疗创新股票C"
    sectors: ["医药生物"]
  001632:
    name: "天弘食品饮料ETF联接C"
    sectors: ["食品饮料"]
  260108:
    name: "景顺长城新兴成长A"
    sectors: ["食品饮料", "家用电器"]
  012414:
    name: "招商中证白酒指数C"

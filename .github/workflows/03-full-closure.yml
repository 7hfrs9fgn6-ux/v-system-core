name: 03-Full-Closure (五阶段主执行工作流)

on:
  workflow_dispatch:
    inputs:
      phase:
        description: '选择阶段'
        required: true
        default: 'post'
        type: choice
        options:
          - pre
          - intraday_a
          - intraday_b
          - post
          - night

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  PYTHON_VERSION: '3.11'
  PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
  TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
  NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
  TIANXING_API_KEY: ${{ secrets.TIANXING_API_KEY }}
  SEARCH_API_KEY: ${{ secrets.SEARCH_API_KEY }}
  ALPHAFEED_API_KEY: ${{ secrets.ALPHAFEED_API_KEY }}

jobs:
  daily-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # ✅ 临时提高到60分钟，确保首次运行成功
    steps:
      - name: ① 检出代码
        uses: actions/checkout@v4

      - name: ② 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: ③ 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: ④ 时区校验
        run: |
          if [ "$(date +%Z)" != "CST" ]; then exit 1; fi
          echo "✅ 时区正确 (CST)"

      - name: ⑤ 获取阶段参数
        id: get_phase
        run: |
          PHASE="${{ github.event.inputs.phase }}"
          echo "phase=$PHASE" >> $GITHUB_OUTPUT
          echo "当前阶段: $PHASE"

      - name: ⑥ 执行完整闭环
        run: |
          python scripts/run_with_push.py --phase ${{ steps.get_phase.outputs.phase }}

       - name: ⑦ 上传宏观缓存（可选，供下载）
        uses: actions/upload-artifact@v4
        with:
          name: macro-cache
          path: memory_data/
          retention-days: 7
          if-no-files-found: ignore

      - name: ⑧ 输出摘要
        run: |
          echo "### 📲 V系统推送摘要" >> $GITHUB_STEP_SUMMARY
          echo "时间: $(date '+%Y-%m-%d %H:%M:%S') (北京时间)" >> $GITHUB_STEP_SUMMARY
          echo "阶段: ${{ steps.get_phase.outputs.phase }}" >> $GITHUB_STEP_SUMMARY
          echo "状态: ✅ 推送完成" >> $GITHUB_STEP_SUMMARY

# V系统策略配置

trust:
  fresh_threshold: 0.70
  stale_threshold: 0.50
  expired_threshold: 0.30
  default_trust: 0.76
  penalty_rate: 0.90

health:
  base_score: 85
  warning_penalty: 10

# 五阶段配置
phases:
  pre:
    name: "盘前预测"
    data_days_back: 1
    trust_adjustment: 0.95
    emoji: "🌅"
  intraday_a:
    name: "盘中A"
    data_days_back: 0
    trust_adjustment: 1.0
    emoji: "📈"
    # ✅ 新增：盘中阶段启用 AlphaFeed
    use_alphafeed: true
  intraday_b:
    name: "盘中B"
    data_days_back: 0
    trust_adjustment: 1.0
    emoji: "📊"
    use_alphafeed: true
  post:
    name: "盘后复盘"
    data_days_back: 0
    trust_adjustment: 1.0
    emoji: "📋"
  night:
    name: "夜间预测"
    data_days_back: 0
    trust_adjustment: 0.90
    emoji: "🌙"

# 持仓映射
holdings:
  009777:
    name: "中欧阿尔法混合C"
    sectors: ["电子", "计算机", "通信"]
  006229:
    name: "中欧医疗创新股票C"
    sectors: ["医药生物"]
  001632:
    name: "天弘食品饮料ETF联接C"
    sectors: ["食品饮料"]
  260108:
    name: "景顺长城新兴成长A"
    sectors: ["食品饮料", "家用电器"]
  012414:
    name: "招商中证白酒指数C"
    sectors: ["食品饮料"]
  012417:
    name: "招商国证生物医药C"
    sectors: ["医药生物"]

# Notion 配置
notion:
  enabled: true
  token: ""
  database_id: ""

# 黄金坑预警
alert:
  enabled: true
  threshold_excess: 0
  cooldown_hours: 24
  push_title: "🔔 黄金坑触发预警"

# ✅ 新增：AlphaFeed 配置
alphafeed:
  enabled: true
  base_url: "https://api.alphafeed.com/v1"
  # token 从环境变量 ALPHAFEED_API_KEY 读取

# ✅ 新增：消息面烈度评分配置
sentiment:
  enabled: true
  cache_ttl: 3600
  # search_api_key 从环境变量 SEARCH_API_KEY 读取

# ✅ 新增：影子系统配置
shadow:
  enabled: true
  reliability_threshold: 0.6
  variants:
    - conservative
    - aggressive
    - momentum
    - mean_reversion

# 消息面烈度评分配置
sentiment:
  enabled: true
  cache_ttl: 3600
  # 天行数据配置（可选）
  tianxing_enabled: true

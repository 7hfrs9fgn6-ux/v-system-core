# V系统策略配置
trust:
  fresh_threshold: 0.70
  stale_threshold: 0.50
  expired_threshold: 0.30
  default_trust: 0.76
  penalty_rate: 0.90
  accumulation:
    enabled: true
    history_weight: 0.5
    recent_weight: 0.3
    confidence_weight: 0.2
    min_samples: 5
    decay_factor: 0.95

health:
  base_score: 85
  warning_penalty: 10
  circuit_breaker:
    enabled: true
    threshold: 30
    auto_recover: true
    recover_threshold: 50

# ✅ 五阶段配置（严格遵守规则）
phases:
  pre:
    name: "盘前预测"
    data_days_back: 1
    trust_adjustment: 0.95
    emoji: "🌅"
    use_alphafeed: false        # 使用 Tushare 主
  intraday_a:
    name: "盘中A"
    data_days_back: 0
    trust_adjustment: 1.0
    emoji: "📈"
    use_alphafeed: true         # 使用 AlphaFeed
  intraday_b:
    name: "盘中B"
    data_days_back: 0
    trust_adjustment: 1.0
    emoji: "📊"
    use_alphafeed: true
  post:
    name: "盘后复盘"
    data_days_back: 0
    trust_adjustment: 1.0
    emoji: "📋"
    use_alphafeed: false        # 使用 Tushare 主
  night:
    name: "夜间预测"
    data_days_back: 0
    trust_adjustment: 0.90
    emoji: "🌙"
    use_alphafeed: false        # 使用 Tushare 主

holdings:
  009777:
    name: "中欧阿尔法混合C"
    sectors: ["电子", "计算机", "通信"]
  006229:
    name: "中欧医疗创新股票C"
    sectors: ["医药生物"]
  001632:
    name: "天弘食品饮料ETF联接C"
    sectors: ["食品饮料"]
  260108:
    name: "景顺长城新兴成长A"
    sectors: ["食品饮料", "家用电器"]
  012414:
    name: "招商中证白酒指数C"
    sectors: ["食品饮料"]
  012417:
    name: "招商国证生物医药C"
    sectors: ["医药生物"]

notion:
  enabled: true
  token: ""
  database_id: ""

alert:
  enabled: true
  threshold_excess: 0
  cooldown_hours: 24
  push_title: "🔔 黄金坑触发预警"

alphafeed:
  enabled: true
  base_url: "https://api.alphafeed.com/v1"
  fallback_chain:
    - "tushare"
    - "akshare"
    - "cache"

sentiment:
  enabled: true
  cache_ttl: 3600
  tianxing_enabled: true

shadow:
  enabled: true
  reliability_threshold: 0.6
  persist: true
  variants:
    - conservative
    - aggressive
    - momentum
    - mean_reversion

relative_strength:
  enabled: true
  lookback_days: 60
  threshold: 1.2

memory:
  enabled: true
  storage_dir: "memory_data/"
  max_active_records: 1000        # 热数据最大条数（最近活跃数据）
  archive_threshold: 500          # 每次归档移动的条数
  max_archive_files: 20           # 最多保留20个归档文件（约覆盖3年以上）
  tables:
    signals: "signal_history.csv"
    shadow: "shadow_history.csv"
    trust: "trust_history.csv"
    deviations: "deviation_history.csv"

rate_limit:
  tushare:
    max_calls_per_minute: 200
  alphafeed:
    max_calls_per_minute: 100

retry:
  max_attempts: 3
  delays: [0, 1, 3]

# ============================================================
# 智能代理配置（新增）
# ============================================================
agent:
  enabled: true  # ⚠️ 默认关闭，设置为 true 启用
  max_tool_calls: 10
  max_reasoning_depth: 5
  timeout: 30
  
# ============================================================
# P0阶段：宏观数据采集配置
# ============================================================
macro:
  enabled: true
  cache_ttl: 300  # 5分钟缓存
  data_sources:
    - "akshare"   # 主数据源
  # 美股配置
  us_market:
    indices:
      - "道琼斯"
      - "纳斯达克"
      - "标普500"
    semiconductor:
      - "费城半导体"
    tech_giants:
      - "苹果"
      - "英伟达"
      - "微软"
      - "谷歌"
      - "亚马逊"
      - "Meta"
      - "特斯拉"
      - "美光"
      - "英特尔"
      - "AMD"
  # 亚太配置
  asia_market:
    indices:
      - "日经225"
      - "韩国KOSPI"
      - "恒生指数"
      - "台湾加权"
  # 欧洲配置
  europe_market:
    indices:
      - "德国DAX"
      - "英国富时"
      - "法国CAC"
  # 大宗商品
  commodities:
    oil:
      - "CL"  # WTI
      - "B"   # 布伦特
    gold: "GC"
  # 汇率
  forex:
    - "美元兑人民币"
  # A50期货
  a50_futures:
    symbol: "A50"

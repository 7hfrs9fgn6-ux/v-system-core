# V系统策略配置文件
# 修改这里可以调整系统行为，无需改动代码

trust:
  # 信任度阈值
  fresh_threshold: 0.70      # >= 此值 → "判断正常"
  stale_threshold: 0.50      # 0.50~0.70 → "判断偏低"
  expired_threshold: 0.30    # < 0.50 → "需谨慎"
  default_trust: 0.76        # 系统初始信任度
  penalty_rate: 0.90         # 安全违规时信任度乘以的系数

health:
  base_score: 85             # 健康度基础分
  warning_penalty: 10        # 每条告警扣分

